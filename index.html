<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Photo Calendar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <style>
        /* --- 動的テーマ用の変数定義 --- */
        :root {
            --bg-color: #0d0d0d;
            --text-color: #e6e6e6;
            --font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Roboto, sans-serif;

            --card-bg: color-mix(in srgb, var(--bg-color) 94%, var(--text-color));
            --tile-bg: color-mix(in srgb, var(--bg-color) 88%, var(--text-color));
            --border-color: color-mix(in srgb, var(--bg-color) 70%, var(--text-color));
            --border-active: color-mix(in srgb, var(--bg-color) 40%, var(--text-color));
            --day-num-color: color-mix(in srgb, var(--bg-color) 50%, var(--text-color));
        }

        * {
            -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
            -webkit-tap-highlight-color: transparent !important;
            -webkit-touch-callout: none !important;
            -webkit-user-select: none !important;
            user-select: none !important;
            outline: none !important;
        }

        html, body {
            width: 100%;
            height: 100%;
            height: 100dvh; 
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            background-color: var(--bg-color);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-family);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* 1. 月カードの縦スクロールコンテナ */
        .month-scroll-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            scroll-snap-type: y proximity; 
            padding: 0;
            -webkit-overflow-scrolling: touch;
            z-index: 5;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
            scroll-behavior: smooth;
        }
        .month-scroll-container::-webkit-scrollbar {
            display: none;
        }

        body.calendar-open .month-scroll-container {
            transform: scale(0.95);
            opacity: 0;
            pointer-events: none;
        }

        .scroll-spacer {
            min-height: calc(50vh - 100px);
            flex-shrink: 0;
        }

        .month-card {
            width: calc(100vw - 20px);
            max-width: 362px;
            aspect-ratio: 16 / 9; 
            background-color: var(--card-bg);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            
            opacity: 0; 
            transform: scale(0.85);
            z-index: 1;
            
            transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1), opacity 0.4s ease, border 0.3s;
            cursor: pointer;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            margin: 10px 0;
            will-change: transform, opacity;
        }

        .month-card.active {
            opacity: 1 !important;
            transform: scale(1) translateY(0) !important;
            z-index: 10 !important;
            border: 1px solid var(--border-active);
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        }
        
        .month-card .card-title {
            position: absolute;
            bottom: 8px;
            left: 12px;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            color: var(--text-color);
            z-index: 4;
            text-shadow: 0 2px 8px var(--bg-color);
            transition: opacity 0.3s ease, text-shadow 0.3s ease;
        }

        .card-slideshow-img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }
        
        .card-slideshow-img.fade-in {
            opacity: 1; 
        }

        .month-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, var(--bg-color) 0%, transparent 30%);
            z-index: 2;
            pointer-events: none;
        }

        /* 2. カレンダーエリア */
        .calendar-container {
            width: 100%;
            position: absolute;
            top: 0;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            overflow: hidden;
            transform: translateX(20px);
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 5;
            display: flex;
            align-items: center;
        }

        body.calendar-open .calendar-container {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .calendar-header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
        }

        .calendar-month-text {
            font-size: 2.4rem;
            font-weight: 200;
            color: var(--text-color);
            letter-spacing: 0.1em;
            line-height: 1;
            opacity: 0.9;
        }

        /* ボタン類の共通スタイル */
        .theme-select-btn, .toggle-view-btn, .settings-btn, 
        .back-to-months-btn, .gallery-close-btn, .lightbox-close-btn, .export-btn {
            color: var(--text-color);
            opacity: 0.7;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            background-color: var(--bg-color);
            text-shadow: none;
            transition: opacity 0.3s, background-color 0.2s, border-color 0.2s;
        }

        .theme-select-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            border-radius: 6px;
        }
        body.calendar-open .theme-select-btn {
            opacity: 0;
            pointer-events: none;
        }

        .export-btn { position: absolute; top: 20px; right: 20px; z-index: 10; }
        .toggle-view-btn { position: absolute; bottom: 40px; right: 20px; z-index: 10; }
        .settings-btn { position: absolute; bottom: 40px; left: 20px; z-index: 10; }
        .gallery-close-btn { position: absolute; top: 20px; left: 20px; z-index: 25; }

        .lightbox-close-btn { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 105; 
            opacity: 0.3; 
            background-color: color-mix(in srgb, var(--bg-color) 40%, transparent); 
            border-color: color-mix(in srgb, var(--border-color) 40%, transparent); 
            backdrop-filter: blur(4px); 
            -webkit-backdrop-filter: blur(4px);
        }
        .lightbox-close-btn:hover, .lightbox-close-btn:active {
            opacity: 1; 
            background-color: color-mix(in srgb, var(--bg-color) 80%, transparent);
        }

        .calendar-scroll-wrapper {
            width: 100%;
            display: flex;
            overflow-x: hidden;
            align-items: center; 
        }
        .calendar-scroll-wrapper::-webkit-scrollbar {
            display: none;
        }

        .calendar-grid {
            display: grid !important;
            grid-template-columns: repeat(7, 1fr) !important;
            gap: 2px !important; 
            width: calc(100vw - 20px) !important;
            max-width: 362px !important;
            background-color: transparent; 
            margin: 0 10px !important; 
            scroll-snap-align: center;
            flex-shrink: 0;
            transition: opacity 0.3s ease; 
        }

        @media (min-width: 382px) {
            .calendar-grid {
                margin: 0 calc((100vw - 362px) / 2) !important;
            }
        }

        /* 書き出し時に前後の月を非表示にする専用のCSS */
        body.export-active #calendar-prev,
        body.export-active #calendar-next {
            display: none !important;
        }

        .day-tile {
            position: relative;
            width: 100% !important;   
            height: auto !important;  
            aspect-ratio: 1 / 1; 
            background-color: var(--tile-bg); 
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            overflow: hidden;
            box-sizing: border-box !important;
        }

        .day-tile.has-image {
            border: 1px solid var(--border-active);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.25);
        }

        .day-tile:nth-child(7n) {
            margin-right: 0px !important;
        }

        .day-tile.blank-tile {
            cursor: default;
            background-color: transparent;
            border: none;
            box-shadow: none; 
        }

        .day-number {
            font-size: 1.4rem;
            font-weight: 200;
            color: var(--day-num-color);
            z-index: 2;
            pointer-events: none;
            line-height: 1;
            margin-top: 2px;
        }

        .day-tile.has-image .day-number {
            display: none !important;
        }

        .day-tile img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
            animation: fadeIn 0.4s ease;
        }

        /* 3. ギャラリービュー */
        .gallery-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            z-index: 20;
            display: none;
            padding-top: 70px; 
            box-sizing: border-box;
            overflow-y: auto;
        }

        .gallery-grid {
            display: grid;
            gap: 1px; 
            background-color: var(--border-active); 
            width: 100%;
        }

        .gallery-tile {
            aspect-ratio: 1 / 1;
            background-color: var(--card-bg);
            border-radius: 0; 
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .gallery-tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 4. 特大写真表示（ライトボックス） */
        .lightbox-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background-color: color-mix(in srgb, var(--bg-color) 95%, transparent);
            z-index: 100;
            display: none; 
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            touch-action: none;
        }

        .lightbox-overlay.open {
            display: flex;
            opacity: 1;
        }

        .lightbox-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lightbox-content-wrapper {
            position: relative;
            display: inline-block;
        }

        .lightbox-img {
            max-width: calc(100vw - 20px);
            max-height: calc(100vh - 30px);
            max-height: calc(100dvh - 30px);
            width: auto;
            height: auto;
            display: block;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @media (min-width: 382px) {
            .lightbox-img {
                max-width: 362px;
            }
        }

        .lightbox-date {
            position: absolute;
            color: var(--text-color);
            opacity: 0.7;
            font-size: 1rem;
            letter-spacing: 0.1em;
            font-weight: 200;
            pointer-events: none;
            transition: bottom 0.2s, right 0.2s;
            z-index: 110;
            text-shadow: 0 2px 4px var(--bg-color), 0 0 8px var(--bg-color);
        }

        /* 5. モーダル共通デザイン */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6); z-index: 200; display: none;
            justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s;
        }
        .modal-overlay.open { display: flex; opacity: 1; }
        .modal-box {
            background-color: var(--card-bg); padding: 30px; border-radius: 12px;
            border: 1px solid var(--border-color); color: var(--text-color);
            display: flex; flex-direction: column; gap: 20px; min-width: 250px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); max-height: 80vh;
        }
        .modal-box h3 { 
            margin: 0; font-weight: 300; letter-spacing: 0.1em; 
            border-bottom: 1px solid var(--border-color); padding-bottom: 10px;
        }
        
        .settings-label { 
            display: flex; justify-content: space-between; align-items: center; 
            font-size: 0.9rem; letter-spacing: 0.05em;
        }
        .modal-box input[type="color"] { 
            background: none; border: none; cursor: pointer; width: 35px; height: 35px; 
            padding: 0; border-radius: 4px; overflow: hidden;
        }
        .modal-box select {
            background-color: var(--bg-color); color: var(--text-color); border: 1px solid var(--border-color);
            padding: 8px; border-radius: 4px; font-family: inherit; outline: none; cursor: pointer;
        }
        .modal-box button {
            background-color: transparent; color: var(--text-color); border: 1px solid var(--border-active);
            padding: 12px; border-radius: 6px; cursor: pointer; margin-top: 10px; font-family: inherit; letter-spacing: 0.1em;
            transition: background-color 0.2s;
        }
        .modal-box button:hover { background-color: var(--border-color); }

        .theme-list {
            list-style: none; padding: 0; margin: 0; 
            max-height: 250px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 6px;
        }
        .theme-item {
            padding: 12px 15px; cursor: pointer; transition: background 0.2s;
            font-size: 0.9rem; letter-spacing: 0.1em;
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .theme-item:last-child { border-bottom: none; }
        .theme-item.active { background-color: var(--text-color); color: var(--bg-color); font-weight: bold; }
        .theme-item:hover:not(.active) { background-color: var(--border-active); }

        .theme-delete-btn {
            color: #ff6b6b; font-size: 1.2rem; line-height: 1; padding: 0 5px; 
            cursor: pointer; opacity: 0.7; transition: opacity 0.2s;
        }
        .theme-delete-btn:hover { opacity: 1; }

        /* 6. カスタムアクションシート */
        .action-sheet-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6); z-index: 300; display: none;
            justify-content: center; align-items: flex-end; opacity: 0; transition: opacity 0.3s;
            padding-bottom: 30px; box-sizing: border-box;
        }
        .action-sheet-overlay.open { display: flex; opacity: 1; }
        .action-sheet-box {
            width: 90%; max-width: 400px;
            display: flex; flex-direction: column; gap: 8px;
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .action-sheet-overlay.open .action-sheet-box { transform: translateY(0); }
        .action-sheet-group {
            display: flex; flex-direction: column;
            background-color: var(--card-bg); border-radius: 12px; overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .action-sheet-btn {
            background-color: transparent; color: var(--text-color); border: none;
            padding: 18px; cursor: pointer; font-family: inherit; font-size: 1rem; letter-spacing: 0.1em;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s;
        }
        .action-sheet-btn:last-child { border-bottom: none; }
        .action-sheet-btn:active { background-color: var(--border-active); }
        .action-sheet-btn.danger { color: #ff6b6b; font-weight: bold; }
        .action-sheet-cancel {
            background-color: var(--card-bg); color: var(--text-color); border: 1px solid var(--border-color);
            padding: 18px; border-radius: 12px; cursor: pointer; font-family: inherit; font-size: 1rem; letter-spacing: 0.1em; font-weight: bold;
            transition: background-color 0.2s;
        }
        .action-sheet-cancel:active { background-color: var(--border-active); }

        /* 書き出し結果表示用オーバーレイ */
        .export-result-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); z-index: 400; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s;
        }
        .export-result-overlay.open { display: flex; opacity: 1; }
        .export-result-header {
            position: absolute; top: 20px; width: calc(100% - 40px);
            display: flex; justify-content: space-between; align-items: center;
            color: var(--text-color); font-size: 0.9rem; letter-spacing: 0.1em;
            z-index: 410;
        }
        #export-result-close-btn {
            background: transparent; border: 1px solid var(--border-color); color: var(--text-color);
            padding: 6px 12px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.8rem;
            letter-spacing: 0.1em; transition: background-color 0.2s;
        }
        #export-result-close-btn:active { background-color: var(--border-active); }
        
        .export-result-img {
            max-width: 90%; max-height: 80%; object-fit: contain;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            -webkit-touch-callout: default !important;
            -webkit-user-select: auto !important;
            user-select: auto !important;
            pointer-events: auto !important;
        }

        #file-input { display: none; }
    </style>
</head>
<body>

    <div class="month-scroll-container" id="scroll-container">
        <div class="scroll-spacer"></div>
        <div class="scroll-spacer"></div>
    </div>

    <div class="theme-select-btn" id="theme-select-btn">THEME: <span id="current-theme-name">Main</span> ▾</div>

    <div class="calendar-container" id="calendar-area">
        <div class="calendar-header">
            <div class="back-to-months-btn" id="back-to-months-btn">← BACK</div>
            <div class="calendar-month-text" id="calendar-month-text"></div>
        </div>

        <div class="settings-btn" id="settings-btn">SETTINGS</div>
        <div class="toggle-view-btn" id="toggle-view-btn">GALLERY</div>
        <div class="export-btn" id="export-btn">EXPORT</div>

        <div class="calendar-scroll-wrapper" id="calendar-wrapper">
            <main class="calendar-grid" id="calendar-prev"></main>
            <main class="calendar-grid" id="calendar-current"></main>
            <main class="calendar-grid" id="calendar-next"></main>
        </div>
    </div>

    <div class="gallery-container" id="gallery-container">
        <div class="gallery-close-btn" id="gallery-close-btn">← BACK</div>
        <div class="gallery-grid" id="gallery-grid"></div>
    </div>

    <div class="lightbox-overlay" id="lightbox">
        <div class="lightbox-close-btn" id="lightbox-close-btn">← BACK</div>
        <div class="lightbox-container" id="lightbox-container">
            <div class="lightbox-content-wrapper">
                <img class="lightbox-img" id="lightbox-image" src="" alt="拡大表示">
                <div class="lightbox-date" id="lightbox-date"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="theme-overlay">
        <div class="modal-box">
            <h3>THEMES</h3>
            <ul class="theme-list" id="theme-list"></ul>
            <button id="add-theme-btn">＋ NEW THEME</button>
            <button id="theme-close-btn">CLOSE</button>
        </div>
    </div>

    <div class="modal-overlay" id="settings-overlay">
        <div class="modal-box">
            <h3>DESIGN</h3>
            <label class="settings-label">背景色
                <input type="color" id="bg-color-picker" value="#0d0d0d">
            </label>
            <label class="settings-label">文字色
                <input type="color" id="text-color-picker" value="#e6e6e6">
            </label>
            <label class="settings-label">フォント
                <select id="font-select">
                    <option value="sans-serif">ゴシック体</option>
                    <option value="serif">明朝体</option>
                    <option value="rounded">丸ゴシック</option>
                    <option value="monospace">等幅フォント</option>
                </select>
            </label>
            <button id="settings-close-btn">OK</button>
        </div>
    </div>

    <div class="action-sheet-overlay" id="action-sheet">
        <div class="action-sheet-box">
            <div class="action-sheet-group">
                <button class="action-sheet-btn" id="action-change-btn">写真を変更する</button>
                <button class="action-sheet-btn danger" id="action-delete-btn">写真を削除する</button>
            </div>
            <button class="action-sheet-cancel" id="action-cancel-btn">キャンセル</button>
        </div>
    </div>

    <div class="export-result-overlay" id="export-result-overlay">
        <div class="export-result-header">
            <span>長押しして「写真を保存」</span>
            <button id="export-result-close-btn">CLOSE</button>
        </div>
        <img class="export-result-img" id="export-result-img" src="" alt="書き出し画像">
    </div>

    <input type="file" id="file-input" accept="image/*">

    <script>
        // ★★★ IndexedDB (大容量保存) のセットアップ ★★★
        const DB_NAME = 'PhotoCalendarDB';
        const STORE_NAME = 'photos';

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function getPhotoData(key) {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(STORE_NAME, 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.get(key);
                request.onsuccess = () => resolve(request.result || {});
                request.onerror = () => reject(request.error);
            });
        }

        async function savePhotoData(key, data) {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(STORE_NAME, 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.put(data, key);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function deletePhotoData(key) {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(STORE_NAME, 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.delete(key);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });

        function getBrightness(hex) {
            let h = hex.replace('#', '');
            if (h.length === 3) h = h.split('').map(c => c + c).join('');
            const r = parseInt(h.substring(0, 2), 16);
            const g = parseInt(h.substring(2, 4), 16);
            const b = parseInt(h.substring(4, 6), 16);
            return (r * 299 + g * 587 + b * 114) / 1000;
        }

            const brightnessDiff = Math.abs(bgBrightness - textBrightness);

        function renderGallery() {

            getPhotoData(storageKey).then(savedPhotos => {

        function createMonthCards() {
            const spacers = scrollContainer.querySelectorAll('.scroll-spacer');
            for (let m = 1; m <= 12; m++) {
                const card = document.createElement('div');
                card.classList.add('month-card');

                const title = document.createElement('div');
                title.classList.add('card-title');
                title.textContent = `${currentYear} . ${String(m).padStart(2, '0')}`;

                img1.classList.add('card-slideshow-img');
                const img2 = document.createElement('img');
                img2.classList.add('card-slideshow-img');
                card.appendChild(img1);
                card.appendChild(img2);

                scrollContainer.insertBefore(card, spacers[1]);

                cardObjects.push({
                    month: m,
                    element: card,
                    images: [img1, img2],
                    intervalId: null
                });

                card.addEventListener('click', () => {
                    if (card.classList.contains('active')) {
                        document.body.classList.add('calendar-open');
                        calendarMonthText.textContent = `${currentYear} . ${String(currentMonth).padStart(2, '0')}`;
                        syncCalendarPosition();

                        isSyncingScroll = true;
                        card.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'nearest' });
                        currentMonth = m;
                        applyLayerEffects();
                        updateAllCalendarGrids();
                        setTimeout(() => { isSyncingScroll = false; syncCalendarPosition(); }, 350);
                    }
                });
            }
            setTimeout(applyLayerEffects, 150);

        async function startCardSlideshow(cardObj) { 
            if (cardObj.intervalId) clearInterval(cardObj.intervalId);
            
            const storageKey = getStorageKey(currentYear, cardObj.month);
            const savedPhotos = await getPhotoData(storageKey); 
            const photoUrls = Object.values(savedPhotos);

            const imgElements = cardObj.images;
            
            if (photoUrls.length === 0) {
                imgElements[0].classList.remove('fade-in');
                imgElements[1].classList.remove('fade-in');
                return;
            }

            let photoIdx = 0;
            let activeElementIdx = 0;

            imgElements[activeElementIdx].src = photoUrls[photoIdx];
            imgElements[activeElementIdx].classList.add('fade-in');

            if (photoUrls.length > 1) {
                cardObj.intervalId = setInterval(() => {
                    photoIdx = (photoIdx + 1) % photoUrls.length;
                    const nextElementIdx = 1 - activeElementIdx;

                    imgElements[nextElementIdx].src = photoUrls[photoIdx];
                    imgElements[nextElementIdx].classList.add('fade-in');
                    imgElements[activeElementIdx].classList.remove('fade-in');

                    activeElementIdx = nextElementIdx;
                }, 4000);
            }
        }

        function updateAllSlideshows() {
            cardObjects.forEach(cardObj => startCardSlideshow(cardObj));
        }

        async function drawGrid(targetGrid, year, month) { 
            targetGrid.innerHTML = '';
            if (month < 1 || month > 12) {
                targetGrid.style.visibility = 'hidden';
                return;
            }
            targetGrid.style.visibility = 'visible';

            const storageKey = getStorageKey(year, month);
            const savedPhotos = await getPhotoData(storageKey); 

            const startDayOfWeek = new Date(year, month - 1, 1).getDay();
            const daysInMonth = new Date(year, month, 0).getDate();

            for (let i = 0; i < startDayOfWeek; i++) {
                const blankTile = document.createElement('div');
                blankTile.classList.add('day-tile', 'blank-tile');
                targetGrid.appendChild(blankTile);
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const tile = document.createElement('div');
                tile.classList.add('day-tile');
                tile.dataset.day = i;
                
                const numberSpan = document.createElement('span');
                numberSpan.classList.add('day-number');
                numberSpan.textContent = i;
                tile.appendChild(numberSpan);

                if (savedPhotos[i]) {
                    const img = document.createElement('img');
                    img.src = savedPhotos[i];
                    tile.appendChild(img);
                    tile.classList.add('has-image');
                }

                tile.addEventListener('click', (e) => {
                    e.stopPropagation();
                    currentSelectedTile = tile;
                    
                    if (tile.classList.contains('has-image')) {
                        collectActiveMonthPhotos();
                        currentPhotoIndex = activeMonthPhotos.findIndex(p => p.day == tile.dataset.day);

                        lightboxImage.src = activeMonthPhotos[currentPhotoIndex].src;
                        lightboxDate.textContent = `${month}.${activeMonthPhotos[currentPhotoIndex].day}`;
                        
                        lightbox.style.display = 'flex';
                        
                        if (lightboxImage.complete) {
                            adjustLightboxDatePosition();
                        }

                        setTimeout(() => {
                            lightbox.classList.add('open');
                        }, 10);
                    } else {
                        fileInput.click();
                    }
                });

                targetGrid.appendChild(tile);
            }

            const totalTiles = startDayOfWeek + daysInMonth;
            const remainTiles = (7 - (totalTiles % 7)) % 7;
            for (let i = 0; i < remainTiles; i++) {
                const blankTile = document.createElement('div');
                blankTile.classList.add('day-tile', 'blank-tile');
                targetGrid.appendChild(blankTile);
            }
        }

        function collectActiveMonthPhotos() {
            activeMonthPhotos = [];
            const tiles = calCurrent.querySelectorAll('.day-tile:not(.blank-tile)');
            tiles.forEach(tile => {
                if (tile.classList.contains('has-image')) {
                    activeMonthPhotos.push({
                        day: tile.dataset.day,
                        src: tile.querySelector('img').src,
                        tileElement: tile
                    });
                }
            });
        }

        function changeLightBoxPhoto(direction) {
            if (activeMonthPhotos.length <= 1) return;

            if (direction === 'next') {
                currentPhotoIndex = (currentPhotoIndex + 1) % activeMonthPhotos.length;
            } else if (direction === 'prev') {
                currentPhotoIndex = (currentPhotoIndex - 1 + activeMonthPhotos.length) % activeMonthPhotos.length;
            }

            lightboxImage.style.opacity = '0';
            setTimeout(() => {
                lightboxImage.src = activeMonthPhotos[currentPhotoIndex].src;
                lightboxDate.textContent = `${currentMonth}.${activeMonthPhotos[currentPhotoIndex].day}`;
                currentSelectedTile = activeMonthPhotos[currentPhotoIndex].tileElement;
                
                if (lightboxImage.complete) {
                    adjustLightboxDatePosition();
                }

                lightboxImage.style.opacity = '1';
            }, 150);
        }

        // --- スワイプとライトボックス操作 ---
        lightboxContainerDOM.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;

        lightboxContainerDOM.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;

        lightboxContainerDOM.addEventListener('mousedown', (e) => {

        lightboxContainerDOM.addEventListener('mouseup', (e) => {

        function handleSwipeGesture() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;

            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) changeLightBoxPhoto('next');
                else changeLightBoxPhoto('prev');
            }
        }

        function adjustLightboxDatePosition() {
            if (!lightbox.classList.contains('open') && lightbox.style.display !== 'flex') return;

        async function updateAllCalendarGrids() { 
            await drawGrid(calCurrent, currentYear, currentMonth);

            drawGrid(calNext, currentYear, currentMonth + 1);
        }

        function syncCalendarPosition() {
            const gridMargin = (window.innerWidth - calCurrent.offsetWidth) / 2;
            const targetLeft = calCurrent.offsetLeft - gridMargin;
            calendarWrapper.scrollLeft = targetLeft;
        }

        function applyLayerEffects() {
            if(document.body.classList.contains('calendar-open')) {
                calendarMonthText.textContent = `${currentYear} . ${String(currentMonth).padStart(2, '0')}`;
            }

            cardObjects.forEach((cardObj) => {
                const card = cardObj.element;
                const diff = cardObj.month - currentMonth;
                
                card.style.pointerEvents = "auto"; 

                if (diff === 0) {
                    card.classList.add('active');
                    card.style.opacity = "1";
                    card.style.transform = "scale(1) translateY(0)";
                    card.style.zIndex = "10";
                } else {
                    card.classList.remove('active');
                    
                    if (diff === 1) { 
                        card.style.transform = "scale(0.85) translateY(-30%)";
                        card.style.opacity = "0.5";
                        card.style.zIndex = "5";
                    } 
                    else if (diff === -1) { 
                        card.style.transform = "scale(0.85) translateY(30%)";
                        card.style.opacity = "0.5";
                        card.style.zIndex = "5";
                    } 
                    else if (diff === 2) { 
                        card.style.transform = "scale(0.7) translateY(-65%)";
                        card.style.opacity = "0.15";
                        card.style.zIndex = "4";
                    }
                    else if (diff === -2) { 
                        card.style.transform = "scale(0.7) translateY(65%)";
                        card.style.opacity = "0.15";
                        card.style.zIndex = "4";
                    }
                    else { 
                        const sign = Math.sign(diff);
                        card.style.transform = `scale(0.5) translateY(${sign * -100}%)`;
                        card.style.opacity = "0";
                        card.style.zIndex = "1";
                        card.style.pointerEvents = "none";
                    }
                }
            });
        }

        scrollContainer.addEventListener('scroll', () => {
            if (isSyncingScroll) return;

            const containerCenter = scrollContainer.scrollTop + scrollContainer.clientHeight / 2;
            let closestCard = null;
            let minDiff = Infinity;

            cardObjects.forEach((cardObj) => {
                const cardCenter = cardObj.element.offsetTop + cardObj.element.clientHeight / 2;
                const diff = Math.abs(containerCenter - cardCenter);
                if (diff < minDiff) {
                    minDiff = diff;
                    closestCard = cardObj;
                }
            });

            if (closestCard && currentMonth !== closestCard.month) {
                currentMonth = closestCard.month;
                applyLayerEffects();
            }

            if(scrollTimeoutId) clearTimeout(scrollTimeoutId);
            
            scrollTimeoutId = setTimeout(async () => { 
                isSyncingScroll = true;
                
                await updateAllCalendarGrids();
                syncCalendarPosition();

                const activeCardObj = cardObjects.find(c => c.month === currentMonth);
                if (activeCardObj) {
                    activeCardObj.element.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'nearest' });
                }
                
                setTimeout(() => { isSyncingScroll = false; }, 300);
            }, 200); 
        });

        // --- 画像アップロード ---
        fileInput.addEventListener('change', async (event) => { 
            const file = event.target.files[0];
            if (file && currentSelectedTile) {
                const day = currentSelectedTile.dataset.day;
                const storageKey = getStorageKey(currentYear, currentMonth);
                let savedPhotos = await getPhotoData(storageKey); 

                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = async function() { 
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        const maxDimension = 800;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxDimension) {
                                height *= maxDimension / width;
                                width = maxDimension;
                            }
                        } else {
                            if (height > maxDimension) {
                                width *= maxDimension / height;
                                height = maxDimension;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;

                        ctx.drawImage(img, 0, 0, width, height);
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);

                        const existingImg = currentSelectedTile.querySelector('img');
                        if (existingImg) existingImg.remove();

                        const displayImg = document.createElement('img');
                        displayImg.src = compressedDataUrl;
                        currentSelectedTile.appendChild(displayImg);
                        currentSelectedTile.classList.add('has-image');

                        if (lightbox.classList.contains('open')) {
                            lightboxImage.src = compressedDataUrl;
                            lightboxDate.textContent = `${currentMonth}.${day}`;
                            collectActiveMonthPhotos();
                        }

                        try {
                            savedPhotos[day] = compressedDataUrl;
                            await savePhotoData(storageKey, savedPhotos); 
                            
                            const currentCardObj = cardObjects.find(c => c.month === currentMonth);
                            startCardSlideshow(currentCardObj);

                        } catch (error) {
                            alert("写真の保存に失敗しました。");
                            console.error(error);
                        }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
            fileInput.value = '';
        });

        // --- 初期起動 ---
        async function initializeApp() {
            loadThemeDesign();
            renderThemeList();
            createMonthCards();
            await updateAllCalendarGrids(); 
            updateAllSlideshows();

            setTimeout(() => {
                const targetCard = cardObjects.find(c => c.month === currentMonth).element;
                targetCard.scrollIntoView({ block: 'center', inline: 'nearest' });
            }, 100);
        }

        window.addEventListener('resize', () => {
            syncCalendarPosition();
            adjustLightboxDatePosition(); 
        });

        window.addEventListener('load', initializeApp);

    </script>
</body>
</html>
